<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NB Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:system-ui;background:#f3f4f6}
.topbar{background:#131921;color:#fff;padding:14px 20px;font-size:22px;font-weight:800}
.filters{max-width:1300px;margin:14px auto 0;background:#fff;padding:12px;border-radius:12px;display:flex;gap:10px;flex-wrap:wrap}
.filters input,.filters select{padding:10px;border-radius:8px;border:1px solid #ddd}
.container{max-width:1300px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
.card{background:#fff;border-radius:14px;padding:10px;box-shadow:0 10px 25px rgba(0,0,0,.08);cursor:pointer;transition:.2s}
.card:hover{transform:translateY(-4px)}
.card img{width:100%;height:220px;object-fit:cover;border-radius:10px}
.price{font-weight:800;color:#b12704;margin-top:4px}
.old{color:#666;text-decoration:line-through;font-size:13px}
.badge{background:#cc0c39;color:#fff;padding:3px 7px;border-radius:6px;font-size:12px;margin-left:6px}
.code{font-size:12px;color:#555;margin-top:2px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:16px;max-width:900px;width:100%;padding:20px;max-height:90vh;overflow:auto}
.thumb{display:flex;gap:6px;margin-top:8px}
.thumb img{width:70px;height:70px;object-fit:cover;b-radius:8px;cursor:pointer;border:2px solid transparent}
.thumb img.active{border-color:#2563eb}
.order-btn{width:100%;margin-top:14px;background:#25D366;border:none;padding:12px;border-radius:10px;font-weight:800;color:#fff;cursor:pointer}
.close{float:right;font-size:22px;cursor:pointer}
</style>
</head>
<body>

<div class="topbar">🛍️ NB Collections</div>

<div class="filters">
<select id="categoryFilter"><option value="">All Categories</option></select>
<input id="minPrice" type="number" placeholder="Min price">
<input id="maxPrice" type="number" placeholder="Max price">
</div>

<div class="container">
<div id="grid" class="grid"></div>
</div>

<div id="modal" class="modal">
<div class="modal-box">
<span id="closeModal" class="close">✖</span>
<div id="modalBody"></div>
</div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,collection,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyCz_ofUMnrO-MpGRZQzi8QFwkFMTM5qK2o",
authDomain:"nbcollections-9c446.firebaseapp.com",
projectId:"nbcollections-9c446"
});
const db=getFirestore(app);

const grid=document.getElementById("grid");
const categoryFilter=document.getElementById("categoryFilter");
const minPrice=document.getElementById("minPrice");
const maxPrice=document.getElementById("maxPrice");
const modal=document.getElementById("modal");
const modalBody=document.getElementById("modalBody");

let products=[];

onSnapshot(collection(db,"products"),snap=>{
products=snap.docs.map(d=>d.data());
buildCats();
applyFilters();
});

function buildCats(){
const set=new Set(products.map(p=>p.category).filter(Boolean));
categoryFilter.innerHTML='<option value="">All Categories</option>';
set.forEach(c=>{
const o=document.createElement("option");
o.value=c;
o.textContent=c;
categoryFilter.appendChild(o);
});
}

categoryFilter.onchange=applyFilters;
minPrice.oninput=applyFilters;
maxPrice.oninput=applyFilters;

function applyFilters(){
const cat=categoryFilter.value;
const min=Number(minPrice.value)||0;
const max=Number(maxPrice.value)||Infinity;

const list=products.filter(p=>{
const price=p.discount||p.price||0;
return(!cat||p.category===cat)&&price>=min&&price<=max;
});

render(list);
}

function discountPercent(p){
if(!p.discount||!p.price) return 0;
return Math.round(((p.price-p.discount)/p.price)*100);
}

function render(list){
grid.innerHTML="";
list.forEach(p=>{
const card=document.createElement("div");
card.className="card";
card.onclick=()=>openProduct(p);

const priceHtml=p.discount
?`
<div class="old">₹${p.price}</div>
<div class="price">₹${p.discount}<span class="badge">${discountPercent(p)}% OFF</span></div>
`
:`<div class="price">₹${p.price||0}</div>`;

card.innerHTML=`
<img src="${p.images?.[0]||""}">
<div><b>${p.name||""}</b></div>
<div class="code">Code: ${p.itemCode||""}</div>
${priceHtml}
`;

grid.appendChild(card);
});
}

function openProduct(p){
let index=0;

modalBody.innerHTML=`
<h2>${p.name||""}</h2>
<div style="font-size:13px;color:#555">Base Code: ${p.itemCode||""}</div>
<img id="mainImg" style="width:100%;border-radius:12px;margin-top:10px">
<div id="thumbRow" class="thumb"></div>
<p>${p.desc||""}</p>
<button id="orderBtn" class="order-btn">enquire about This Product on Whatsapp</button>
`;

modal.style.display="flex";

const mainImg=document.getElementById("mainImg");
const thumbRow=document.getElementById("thumbRow");

function show(){
mainImg.src=p.images?.[index]||"";
thumbRow.querySelectorAll("img").forEach((t,i)=>t.classList.toggle("active",i===index));
}

(p.images||[]).forEach((img,i)=>{
const t=document.createElement("img");
t.src=img;
t.onclick=()=>{index=i;show();};
thumbRow.appendChild(t);
});

show();

document.getElementById("orderBtn").onclick=()=>{
const finalCode=`${p.itemCode||""}/${index+1}`;

const message=
`Hello, I want to enquire about this product:

Item Code: ${finalCode}
Name: ${p.name||""}

Description:
${p.desc||""}

*Enter You Enquiry*:
`;

const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const url=isMobile
?`https://wa.me/917798419643?text=${encodeURIComponent(message)}`
:`https://web.whatsapp.com/send?phone=917798419643&text=${encodeURIComponent(message)}`;

window.open(url,"_blank");
};
}

document.getElementById("closeModal").onclick=()=>{
modal.style.display="none";
};
</script>
</body>
</html>
