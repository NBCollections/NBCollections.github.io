<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NB Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#0b1220;
  --card:#121a2b;
  --accent:#6366f1;
  --accent2:#22c55e;
  --danger:#ef4444;
  --text:#e5e7eb;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:linear-gradient(135deg,#0b1220,#020617);color:var(--text)}
.container{max-width:1150px;margin:auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.title{font-size:28px;font-weight:800}
.card{background:var(--card);border-radius:18px;padding:20px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
input,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid #243041;background:#020617;color:#fff}
button{border:none;padding:12px 16px;border-radius:12px;font-weight:700;cursor:pointer}
.primary{background:var(--accent2);color:#052e16}
.editBtn{background:var(--accent);color:white}
.danger{background:var(--danger);color:white}
.preview-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.preview{width:70px;height:70px;object-fit:cover;border-radius:8px;border:1px solid #243041}
.product-row{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #1f2937}
.code-badge{background:#1d4ed8;padding:3px 8px;border-radius:999px;font-size:12px;margin-left:6px}
.hidden{display:none}
.searchBox{display:flex;gap:10px;margin-bottom:10px}
.searchBox input{flex:1}
.badge{font-size:12px;opacity:.8}
.clickable-name{cursor:pointer;color:#93c5fd}

/* 🔥 IMPROVED MOBILE MODAL */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:none;align-items:flex-end;justify-content:center;
  z-index:999;
}
.modal.active{display:flex}
.modal-card{
  background:#0f172a;
  width:100%;
  max-width:720px;
  max-height:90vh;
  overflow:auto;
  border-radius:20px 20px 0 0;
  padding:18px;
  animation:slideUp .25s ease;
}
@keyframes slideUp{
  from{transform:translateY(40px);opacity:.6}
  to{transform:translateY(0);opacity:1}
}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.modal img{width:100%;border-radius:12px}
.close-btn{
  position:sticky;
  top:0;
  float:right;
  background:#ef4444;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* 📱 MOBILE PERFECT */
@media(max-width:700px){
  .modal{
    align-items:flex-end;
  }
  .modal-card{
    border-radius:22px 22px 0 0;
    padding:16px;
  }
  .modal-grid{
    grid-template-columns:1fr;
  }
}

@media(max-width:480px){
  .product-row{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }
}
</style>
</head>
<body>

<div class="container">

<div id="loginCard" class="card" style="max-width:420px;margin:80px auto">
<h2>Admin Login</h2>
<input id="pinInput" type="password" maxlength="6" placeholder="Enter PIN">
<br><br>
<button id="loginBtn" class="primary">Login</button>
<div id="loginMsg"></div>
</div>

<div id="panel" class="hidden">

<div class="header">
<div class="title">🛍️ NB Collections Admin</div>
<div class="badge">Live Panel</div>
</div>

<div class="card">
<h2 id="formTitle">Add Product</h2>

<div class="grid">
<input id="name" placeholder="Product name">
<input id="category" placeholder="Category">
<input id="price" type="number" placeholder="Price (required)">
<input id="discount" type="number" placeholder="Discount (optional)">
</div>

<textarea id="desc" placeholder="Description"></textarea>

<label>Product Images (1–5)</label>
<input id="images" type="file" accept="image/*" multiple>
<div id="imagePreview" class="preview-grid"></div>

<br>
<button id="submitBtn" class="primary">Upload Product</button>
<div id="msg"></div>
</div>

<div class="card">
<h2>Products</h2>

<div class="searchBox">
<input id="searchCode" placeholder="🔍 Search by Item Code">
<button id="clearSearch">Clear</button>
</div>

<div id="productList"></div>
</div>

</div>
</div>

<!-- 🔥 PRODUCT MODAL -->
<div id="productModal" class="modal">
  <div class="modal-card">
    <div class="close-btn" id="closeModal">✕</div>
    <h2 id="modalName"></h2>
    <div class="modal-grid">
      <div id="modalImages"></div>
      <div>
        <p><b>Item Code:</b> <span id="modalCode"></span></p>
        <p><b>Price:</b> ₹<span id="modalPrice"></span></p>
        <p><b>Discount:</b> <span id="modalDiscount"></span></p>
        <p><b>Category:</b> <span id="modalCategory"></span></p>
        <p><b>Description:</b></p>
        <p id="modalDesc" style="opacity:.9"></p>
      </div>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,collection,addDoc,serverTimestamp,onSnapshot,deleteDoc,doc,getDocs,updateDoc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyCz_ofUMnrO-MpGRZQzi8QFwkFMTM5qK2o",
authDomain:"nbcollections-9c446.firebaseapp.com",
projectId:"nbcollections-9c446"
});

const db=getFirestore(app);

let selectedFiles=[];
let nextCode=1000;
let editingId=null;
let existingImages=[];
let allProducts=[];

const loginBtn=document.getElementById("loginBtn");
const submitBtn=document.getElementById("submitBtn");
const imagesInput=document.getElementById("images");
const searchInput=document.getElementById("searchCode");

const modal=document.getElementById("productModal");
document.getElementById("closeModal").onclick=()=>modal.classList.remove("active");
modal.onclick=e=>{if(e.target===modal) modal.classList.remove("active")};

loginBtn.onclick=async()=>{
const pin=document.getElementById("pinInput");
if(pin.value==="123456"){
document.getElementById("loginCard").classList.add("hidden");
document.getElementById("panel").classList.remove("hidden");
await prepareNextCode();
startProductsListener();
}else document.getElementById("loginMsg").textContent="Wrong PIN";
};

async function prepareNextCode(){
const snap=await getDocs(collection(db,"products"));
let max=999;
snap.forEach(d=>{
const n=parseInt(d.data().itemCode);
if(!isNaN(n)&&n>max) max=n;
});
nextCode=max+1;
}

function compressImage(file){
return new Promise(resolve=>{
const img=new Image();
const reader=new FileReader();
reader.onload=e=>img.src=e.target.result;
img.onload=()=>{
const MAX_WIDTH=800;
const scale=Math.min(1,MAX_WIDTH/img.width);
const canvas=document.createElement("canvas");
canvas.width=img.width*scale;
canvas.height=img.height*scale;
canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
resolve(canvas.toDataURL("image/jpeg",0.6));
};
reader.readAsDataURL(file);
});
}

imagesInput.addEventListener("change",e=>{
const files=[...e.target.files];
for(const f of files){
if(selectedFiles.length+existingImages.length>=5) break;
selectedFiles.push(f);
}
renderPreview();
imagesInput.value="";
});

function renderPreview(){
const box=document.getElementById("imagePreview");
box.innerHTML="";
existingImages.forEach(src=>{
const img=document.createElement("img");
img.src=src;img.className="preview";box.appendChild(img);
});
selectedFiles.forEach(f=>{
const img=document.createElement("img");
img.src=URL.createObjectURL(f);img.className="preview";box.appendChild(img);
});
}

function resetForm(){
document.querySelectorAll("input,textarea").forEach(el=>el.value="");
selectedFiles=[];existingImages=[];editingId=null;
document.getElementById("imagePreview").innerHTML="";
submitBtn.textContent="Upload Product";
document.getElementById("formTitle").textContent="Add Product";
}

submitBtn.onclick=async()=>{
const name=document.getElementById("name").value.trim();
const price=Number(document.getElementById("price").value);
const msg=document.getElementById("msg");
if(!name){alert("Product name required");return;}
if(!price||price<=0){alert("Valid price required");return;}
submitBtn.disabled=true;
msg.textContent=editingId?"Updating...":"Uploading...";
try{
let imageUrls=[...existingImages];
for(const f of selectedFiles) imageUrls.push(await compressImage(f));
if(imageUrls.length<1||imageUrls.length>5){alert("Total images must be 1–5");submitBtn.disabled=false;return;}

if(editingId){
await updateDoc(doc(db,"products",editingId),{
name,
desc:document.getElementById("desc").value.trim()||"",
price,
discount:document.getElementById("discount").value?Number(document.getElementById("discount").value):null,
category:document.getElementById("category").value.trim()||"",
images:imageUrls
});
msg.textContent="✅ Product updated";
}else{
await addDoc(collection(db,"products"),{
itemCode:String(nextCode),
name,
desc:document.getElementById("desc").value.trim()||"",
price,
discount:document.getElementById("discount").value?Number(document.getElementById("discount").value):null,
category:document.getElementById("category").value.trim()||"",
images:imageUrls,
created:serverTimestamp()
});
nextCode++;
msg.textContent="✅ Product added";
}
resetForm();
}catch(err){msg.textContent="Error: "+err.message}
submitBtn.disabled=false;
};

// SEARCH

document.getElementById("clearSearch").onclick=()=>{searchInput.value="";renderList();};
searchInput.addEventListener("input",renderList);

function startProductsListener(){
onSnapshot(collection(db,"products"),snap=>{
allProducts=[];
snap.forEach(d=>allProducts.push({id:d.id,...d.data()}));
renderList();
});
}

function openModal(p){
document.getElementById("modalName").textContent=p.name||"";
document.getElementById("modalCode").textContent=p.itemCode||"";
document.getElementById("modalPrice").textContent=p.price||"";
document.getElementById("modalDiscount").textContent=p.discount||"None";
document.getElementById("modalCategory").textContent=p.category||"";
document.getElementById("modalDesc").textContent=p.desc||"";

const imgBox=document.getElementById("modalImages");
imgBox.innerHTML="";
(p.images||[]).forEach(src=>{
const img=document.createElement("img");img.src=src;imgBox.appendChild(img);
});

modal.classList.add("active");
}

function renderList(){
const list=document.getElementById("productList");
list.innerHTML="";
const q=searchInput.value.trim();

allProducts
.filter(p=>!q||String(p.itemCode||"").includes(q))
.forEach(p=>{
const row=document.createElement("div");
row.className="product-row";
row.innerHTML=`
<div>
<b class="clickable-name">${p.name||"No name"}</b>
<span class="code-badge">${p.itemCode||""}</span>
</div>
<div style="display:flex;gap:6px">
<button class="editBtn">Edit</button>
<button class="danger">Delete</button>
</div>`;

row.querySelector(".clickable-name").onclick=()=>openModal(p);

row.querySelector(".editBtn").onclick=()=>{
editingId=p.id;
existingImages=p.images||[];
document.getElementById("name").value=p.name||"";
document.getElementById("price").value=p.price||"";
document.getElementById("desc").value=p.desc||"";
document.getElementById("discount").value=p.discount||"";
document.getElementById("category").value=p.category||"";
selectedFiles=[];
renderPreview();
submitBtn.textContent="Update Product";
document.getElementById("formTitle").textContent="Edit Product";
window.scrollTo({top:0,behavior:"smooth"});
};

row.querySelector(".danger").onclick=async()=>{
if(confirm("Delete product?")) await deleteDoc(doc(db,"products",p.id));
};

list.appendChild(row);
});
}
</script>
</body>
</html>
