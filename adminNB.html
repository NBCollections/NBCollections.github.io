<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NB Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:system-ui;background:#0f172a;color:#e5e7eb}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#111827;border-radius:16px;padding:20px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
input,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid #334155;background:#020617;color:#fff}
button{background:#22c55e;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer}
button.danger{background:#ef4444;color:#fff}
.preview-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.preview{width:70px;height:70px;object-fit:cover;border-radius:8px}
.product-row{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #1f2937}
.hidden{display:none}
.code-badge{background:#2563eb;padding:2px 6px;border-radius:6px;font-size:12px;margin-left:6px}
</style>
</head>
<body>

<div class="container">

<div id="loginCard" class="card" style="max-width:420px;margin:80px auto">
<h2>Admin Login</h2>
<input id="pinInput" type="password" maxlength="6" placeholder="Enter PIN">
<button id="loginBtn">Login</button>
<div id="loginMsg"></div>
</div>

<div id="panel" class="hidden">

<div class="card">
<h2>Add Product</h2>

<div class="grid">
<input id="name" placeholder="Product name">
<input id="category" placeholder="Category">
<input id="price" type="number" placeholder="Price (required)">
<input id="discount" type="number" placeholder="Discount (optional)">
</div>

<textarea id="desc" placeholder="Description"></textarea>

<label>Product Images (1–5)</label>
<input id="images" type="file" accept="image/*" multiple>
<div id="imagePreview" class="preview-grid"></div>

<button id="submitBtn">Upload Product</button>
<div id="msg"></div>
</div>

<div class="card">
<h2>Products</h2>
<div id="productList"></div>
</div>

</div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,collection,addDoc,serverTimestamp,onSnapshot,deleteDoc,doc,getDocs}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyCz_ofUMnrO-MpGRZQzi8QFwkFMTM5qK2o",
authDomain:"nbcollections-9c446.firebaseapp.com",
projectId:"nbcollections-9c446"
});
const db=getFirestore(app);

let selectedFiles=[];
let nextCode=1000;

const loginBtn=document.getElementById("loginBtn");
const submitBtn=document.getElementById("submitBtn");
const imagesInput=document.getElementById("images");

loginBtn.onclick=async()=>{
const pin=document.getElementById("pinInput");
if(pin&&pin.value==="123456"){
document.getElementById("loginCard").classList.add("hidden");
document.getElementById("panel").classList.remove("hidden");
await prepareNextCode();
startProductsListener();
}else{
document.getElementById("loginMsg").textContent="Wrong PIN";
}
};

async function prepareNextCode(){
const snap=await getDocs(collection(db,"products"));
let max=999;
snap.forEach(d=>{
const n=parseInt(d.data().itemCode);
if(!isNaN(n)&&n>max) max=n;
});
nextCode=max+1;
}

function compressImage(file){
return new Promise(resolve=>{
const img=new Image();
const reader=new FileReader();
reader.onload=e=>img.src=e.target.result;
img.onload=()=>{
const MAX_WIDTH=800;
const scale=Math.min(1,MAX_WIDTH/img.width);
const canvas=document.createElement("canvas");
canvas.width=img.width*scale;
canvas.height=img.height*scale;
canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
resolve(canvas.toDataURL("image/jpeg",0.6));
};
reader.readAsDataURL(file);
});
}

imagesInput.addEventListener("change",e=>{
const files=[...e.target.files];
for(const f of files){
if(selectedFiles.length>=5) break;
selectedFiles.push(f);
}
renderPreview();
imagesInput.value="";
});

function renderPreview(){
const box=document.getElementById("imagePreview");
box.innerHTML="";
selectedFiles.forEach(f=>{
const img=document.createElement("img");
img.src=URL.createObjectURL(f);
img.className="preview";
box.appendChild(img);
});
}

submitBtn.onclick=async()=>{
const nameEl=document.getElementById("name");
const priceEl=document.getElementById("price");
const descEl=document.getElementById("desc");
const discountEl=document.getElementById("discount");
const categoryEl=document.getElementById("category");
const msgEl=document.getElementById("msg");

const productName=nameEl.value.trim();
const priceValue=Number(priceEl.value);

if(!productName){alert("Product name required");return;}
if(!priceEl.value||priceValue<=0){alert("Valid price required");return;}
if(selectedFiles.length<1||selectedFiles.length>5){alert("Upload 1–5 images");return;}

submitBtn.disabled=true;
msgEl.textContent="Uploading...";

try{
const imageUrls=[];
for(const f of selectedFiles){
imageUrls.push(await compressImage(f));
}

await addDoc(collection(db,"products"),{
itemCode:String(nextCode),
name:productName,
desc:descEl?.value?.trim()||"",
price:priceValue,
discount:discountEl?.value?Number(discountEl.value):null,
category:categoryEl?.value?.trim()||"",
images:imageUrls,
created:serverTimestamp()
});

nextCode++;
msgEl.textContent="✅ Product added";

document.querySelectorAll("input,textarea").forEach(el=>el.value="");
selectedFiles=[];
document.getElementById("imagePreview").innerHTML="";
}catch(err){
msgEl.textContent="Error: "+err.message;
}
submitBtn.disabled=false;
};

function startProductsListener(){
onSnapshot(collection(db,"products"),snap=>{
const list=document.getElementById("productList");
list.innerHTML="";
snap.forEach(d=>{
const p=d.data();
const row=document.createElement("div");
row.className="product-row";
row.innerHTML=`
<div>
<b>${p.name||"No name"}</b>
<span class="code-badge">${p.itemCode||""}</span>
</div>
<button class="danger">Delete</button>
`;
row.querySelector("button").onclick=async()=>{
if(confirm("Delete product?")){
await deleteDoc(doc(db,"products",d.id));
}
};
list.appendChild(row);
});
});
}
</script>
</body>
</html>
